name: Deploy Vue App to Aliyun ECS

on:
  push:
    branches: [ master ]   # 当推送到 master 分支时触发
  # 也可以添加手动触发按钮
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v6

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'   # 根据你的 Vue 项目要求选择版本

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci
        # 如果你使用 yarn，则用 yarn install --frozen-lockfile

      # 4. 打包 Vue 项目
      - name: Build project
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build
        # 默认输出目录是 dist/，如果是其他目录（如 build/），请在下文相应修改

      # 5. 通过 rsync 上传 dist/ 内容到 ECS
      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@5.2
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /opt/web/exam/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          remote_port: ${{ secrets.SERVER_PORT || 22 }}
