name: Deploy Vue App to Aliyun ECS

on:
  push:
    branches: [ master ]   # 当推送到 master 分支时触发
  # 也可以添加手动触发按钮
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # 根据你的 Vue 项目要求选择版本

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci
        # 如果你使用 yarn，则用 yarn install --frozen-lockfile

      # 4. 打包 Vue 项目
      - name: Build project
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build
        # 默认输出目录是 dist/，如果是其他目录（如 build/），请在下文相应修改

      # 5. 通过 SCP 上传 dist/ 内容到 ECS
      - name: Deploy to ECS
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          # port: ${{ secrets.SERVER_PORT }}   # 如果没有定义 SERVER_PORT，可以写 22 或者删除这一行
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"          # 上传 dist 目录下的所有文件
          target: "/opt/web/exam"   # 目标目录，注意与 Nginx root 一致
          strip_components: 1       # 去掉上传路径中的 dist/ 这一层目录
          # 如果不需要 strip_components，也可以写成 source: "dist/" target: "/var/www/vue-app" 效果相同
